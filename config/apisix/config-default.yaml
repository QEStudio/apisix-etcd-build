# APISIX Default Configuration
# This file contains default values that can be overridden in config.yaml

apisix:
  node_listen: 9080
  enable_admin: true
  enable_admin_cors: true
  enable_debug: false
  enable_dev_mode: false
  enable_reuseport: true
  show_upstream_status_in_response_header: false
  delete_uri_tail_slash: false
  router:
    http: radixtree_uri
    ssl: radixtree_sni
  dns_resolver:
    - 8.8.8.8
    - 8.8.4.4
  dns_resolver_valid: 30
  ssl:
    enable: true
    listen:
      - port: 9443
    ssl_protocols: TLSv1.2 TLSv1.3
    ssl_ciphers: ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384

deployment:
  role: traditional
  role_traditional:
    config_provider: etcd
  admin:
    enable_admin_cors: true
    admin_listen:
      ip: 0.0.0.0
      port: 9090
    https_admin: false
    admin_api_mtls:
      admin_ssl_cert: ""
      admin_ssl_cert_key: ""
    admin_key:
      - name: "admin"
        key: edd1c9f034335f136f87ad84b625c8f1
        role: admin
  etcd:
    host:
      - "http://etcd:2379"
    prefix: "/apisix"
    timeout: 30
    health_check_timeout: 10
    health_check_interval: 10

nginx_config:
  error_log_level: "warn"
  worker_processes: auto
  enable_cpu_affinity: true
  worker_rlimit_nofile: 20480
  max_pending_timers: 16384
  max_running_timers: 4096
  event:
    worker_connections: 10620
  http:
    enable_access_log: true
    access_log: "/usr/local/apisix/logs/access.log"
    access_log_format: "$remote_addr - $remote_user [$time_local] \"$request\" $status $body_bytes_sent $request_time \"$http_referer\" \"$http_user_agent\" $upstream_addr $upstream_status $upstream_response_time"
    access_log_format_escape: default
    keepalive_timeout: 60s
    client_header_timeout: 60s
    client_body_timeout: 60s
    send_timeout: 10s
    underscores_in_headers: "on"
    real_ip_header: X-Real-IP
    real_ip_from:
      - 127.0.0.1
      - "unix:"
    client_max_body_size: 0
    upstream:
      keepalive: 320
      keepalive_timeout: 60s
      keepalive_requests: 1000
  stream:
    enable_access_log: false
